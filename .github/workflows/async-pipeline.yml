# Generated by async-pipeline. Do not edit by hand.
# Run: async-pipeline github generate

name: Async Pipeline

on:
  pull_request:
  push:
    branches:
      - "main"
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        type: choice
        options:
          - "pages"
          - "publish"
          - "publish-github"
          - "release-doctor"

permissions:
  contents: read

jobs:
  publish:
    name: publish
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish') || (github.event_name == 'release' && (github.event.action == 'published'))
    runs-on: ubuntu-latest
    environment:
      name: "npm-publish"
      url: "https://www.npmjs.com/package/@patrickjs/package-size"
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Use current npm
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job publish --output .async/actions/cache/publish-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: restore
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-only

      - name: Run pipeline task pack
        uses: async/actions/run@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          command: "pnpm async-pipeline github check && pnpm async-pipeline run-task pack"
          check-generated: false
          artifact-name: async-pipeline-${{ github.job }}-pack-runs
        env:
          CI: true

      - name: Plan release package
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: plan
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Inspect release package
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: inspect
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Check release changelog
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: changelog
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Render release notes
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: notes
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Create or update GitHub Release
        uses: async/actions/publish@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          package-path: "."
          mode: github-release
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          notes-file: .async/release/release-notes.md
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        uses: async/actions/publish@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          package-path: "."
          mode: github-packages
          registry: "https://npm.pkg.github.com"
          dist-tag: "latest"
          token-env-name: GITHUB_TOKEN
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm package
        uses: async/actions/publish@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          package-path: "."
          mode: npm
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          token-env-name: NODE_AUTH_TOKEN
          provenance: true
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

      - name: Run release doctor
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: doctor
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
          network: live
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: save
          manifest: .async/actions/cache/publish-cache-manifest.json
          trust: read-write

  publish-github:
