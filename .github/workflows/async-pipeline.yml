      - name: Plan release package
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: plan
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Inspect release package
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: inspect
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Check release changelog
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: changelog
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Render release notes
        uses: async/actions/doctor@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: notes
          package-path: "."
          evidence-dir: .async/release
          release-command: "pnpm dlx github:async/release#v0.1.5"
        env:
          CI: true

      - name: Create or update GitHub Release
        uses: async/actions/publish@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          package-path: "."
          mode: github-release
          registry: "https://registry.npmjs.org"
          dist-tag: "latest"
          notes-file: .async/release/release-notes.md
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        uses: async/actions/publish@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          package-path: "."
          mode: github-packages
          registry: "https://npm.pkg.github.com"
          dist-tag: "latest"
          token-env-name: GITHUB_TOKEN
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Async task cache
        if: ${{ success() && github.event_name != 'pull_request' && steps.async-cache-restore.outputs.cache-hit != 'true' }}
        uses: async/actions/cache@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: save
          manifest: .async/actions/cache/publish-github-cache-manifest.json
          trust: read-write

  release-doctor:
    name: release-doctor
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'release-doctor'
    runs-on: ubuntu-latest
    permissions:
      contents: read
