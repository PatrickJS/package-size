      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write task cache manifest
        run: pnpm async-pipeline cache manifest --job publish-github --output .async/actions/cache/publish-github-cache-manifest.json --trust read-only

      - name: Restore Async task cache
        id: async-cache-restore
        uses: async/actions/cache@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: restore
