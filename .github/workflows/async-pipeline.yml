      - name: Upload Pages artifact
        uses: async/actions/pages@41e79159e12a7a2092c6911d850450082a8add09 # v0.1.20
        with:
          mode: static
          path: ".async/pages"

  pages-deploy:
    name: pages-deploy
    needs: "pages"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: "github-pages"
      url: "${{ steps.deployment.outputs.page_url }}"
